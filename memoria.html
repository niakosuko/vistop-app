<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VISTOP – Memoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#050A14; --bg-input:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.15); --border-focus:rgba(0,212,255,0.6); --cyan:#00D4FF; --text-primary:#FFFFFF; --text-secondary:rgba(255,255,255,0.75); --text-muted:rgba(255,255,255,0.45); --radius-pill:100px; --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif; }
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text-primary);font-family:var(--font-body);font-size:16px;line-height:1.5;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
  .screen{display:flex;flex-direction:column;height:100%;}
  .top-bar{padding:14px 16px 10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);}
  .top-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;}
  .filters{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .filter-row{display:flex;gap:8px;align-items:center;}
  .filter-label{font-size:11px;color:var(--text-secondary);font-weight:600;min-width:38px;flex-shrink:0;}
  .filter-input{flex:1;padding:9px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;-webkit-appearance:none;}
  .filter-input:focus{border-color:var(--border-focus);}
  .filter-input[type="datetime-local"]{color-scheme:dark;}
  ::placeholder{color:rgba(255,255,255,0.3);}
  .filter-search{display:flex;gap:8px;align-items:center;}
  .search-wrap{flex:1;position:relative;}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:0.45;pointer-events:none;}
  .search-input{width:100%;padding:9px 12px 9px 34px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;}
  .search-input:focus{border-color:var(--border-focus);}
  .person-filter-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
  .person-filter-wrap::-webkit-scrollbar{display:none;}
  .person-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.15);background:transparent;font-family:var(--font-display);font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
  .person-chip.active{border-color:rgba(0,212,255,0.5);color:var(--cyan);background:rgba(0,212,255,0.1);}
  .person-chip.unknown-chip.active{border-color:rgba(200,159,255,0.5);color:#C89FFF;background:rgba(200,159,255,0.1);}
  .clear-btn{padding:9px 14px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--text-secondary);font-family:var(--font-display);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .result-count{font-size:11px;color:var(--text-muted);padding:8px 0 0;}
  .result-count span{color:var(--cyan);font-weight:700;}
  .memory-list{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;}
  .memory-list::-webkit-scrollbar{display:none;}
  .day-block{margin-bottom:4px;}
  .day-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.12em;text-transform:uppercase;padding:16px 0 8px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:10px;}
  .memory-line{display:flex;gap:10px;padding:6px 0;align-items:baseline;border-bottom:1px solid rgba(255,255,255,0.04);}
  .line-time{font-family:var(--font-display);font-size:10px;color:rgba(255,255,255,0.4);flex-shrink:0;min-width:38px;padding-top:2px;}
  .line-speaker{font-family:var(--font-display);font-size:12px;font-weight:700;flex-shrink:0;min-width:60px;}
  .line-speaker.sp-t{color:var(--cyan);}
  .line-speaker.sp-u{color:#C89FFF;}
  .line-speaker.sp-i{color:#FFB347;}
  .line-text{font-size:14px;color:var(--text-primary);line-height:1.6;flex:1;}
  .line-text mark{background:rgba(0,212,255,0.25);color:var(--cyan);border-radius:3px;padding:0 2px;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 24px;text-align:center;}
  .empty-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:rgba(255,255,255,0.6);}
  .empty-body{font-size:13px;color:rgba(255,255,255,0.35);max-width:240px;line-height:1.6;}
</style>
</head>
<body>
<div class="screen">
  <div class="top-bar">
    <div class="top-title" id="mem-title">Memoria</div>
    <div class="filters">
      <div class="filter-row"><span class="filter-label" id="lbl-desde">Desde</span><input type="datetime-local" class="filter-input" id="filter-desde" onchange="aplicarFiltros()"></div>
      <div class="filter-row"><span class="filter-label" id="lbl-hasta">Hasta</span><input type="datetime-local" class="filter-input" id="filter-hasta" onchange="aplicarFiltros()"></div>
      <div class="filter-search">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="filter-texto" oninput="aplicarFiltros()">
        </div>
        <button type="button" class="clear-btn" id="btn-clear" onclick="limpiarFiltros()">Limpiar</button>
      </div>
      <div class="person-filter-wrap" id="person-filter-wrap"></div>
    </div>
    <div class="result-count" id="result-count"></div>
  </div>
  <div class="memory-list" id="memory-list">
    <div class="empty-state" id="empty-state">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <div class="empty-title" id="empty-title">Sin registros aún</div>
      <div class="empty-body" id="empty-body">Las transcripciones aparecerán acá automáticamente.</div>
    </div>
  </div>
</div>
<script>
const VISTOP=window.parent?.VISTOP||{get:()=>[]};
let todaLaMemoria=[], filtroPersona=null;

const MEM_T={
  es:{title:'Memoria',desde:'Desde',hasta:'Hasta',search:'Buscar en memoria...',clear:'Limpiar',empty_title:'Sin registros aún',empty_body:'Las transcripciones aparecerán acá automáticamente.',today:'Hoy',yesterday:'Ayer',records:'registro',records_pl:'registros',todos:'Todos'},
  en:{title:'Memory',desde:'From',hasta:'To',search:'Search memory...',clear:'Clear',empty_title:'No records yet',empty_body:'Transcriptions will appear here automatically.',today:'Today',yesterday:'Yesterday',records:'record',records_pl:'records',todos:'All'},
  pt:{title:'Memória',desde:'De',hasta:'Até',search:'Buscar na memória...',clear:'Limpar',empty_title:'Sem registros ainda',empty_body:'As transcrições aparecerão aqui automaticamente.',today:'Hoje',yesterday:'Ontem',records:'registro',records_pl:'registros',todos:'Todos'},
  fr:{title:'Mémoire',desde:'De',hasta:'À',search:'Rechercher...',clear:'Effacer',empty_title:'Pas encore de données',empty_body:'Les transcriptions apparaîtront ici automatiquement.',today:"Aujourd'hui",yesterday:'Hier',records:'entrée',records_pl:'entrées',todos:'Tous'},
  de:{title:'Speicher',desde:'Von',hasta:'Bis',search:'Suchen...',clear:'Löschen',empty_title:'Noch keine Aufzeichnungen',empty_body:'Transkriptionen erscheinen hier automatisch.',today:'Heute',yesterday:'Gestern',records:'Eintrag',records_pl:'Einträge',todos:'Alle'},
  it:{title:'Memoria',desde:'Da',hasta:'A',search:'Cerca...',clear:'Cancella',empty_title:'Nessun record ancora',empty_body:'Le trascrizioni appariranno qui automaticamente.',today:'Oggi',yesterday:'Ieri',records:'record',records_pl:'record',todos:'Tutti'},
  ru:{title:'Память',desde:'С',hasta:'До',search:'Поиск...',clear:'Очистить',empty_title:'Записей пока нет',empty_body:'Транскрипции появятся здесь автоматически.',today:'Сегодня',yesterday:'Вчера',records:'запись',records_pl:'записей',todos:'Все'},
};

function getLang(){const t=VISTOP.get('titular',{})||{},i=(t&&t.idioma)?t.idioma:'es-AR';if(i.startsWith('en'))return 'en';if(i.startsWith('pt'))return 'pt';if(i.startsWith('fr'))return 'fr';if(i.startsWith('de'))return 'de';if(i.startsWith('it'))return 'it';if(i.startsWith('ru'))return 'ru';return 'es';}
function getTitularName(){const t=VISTOP.get('titular',{});return t?.nombre?t.nombre.split(' ')[0]:'Titular';}

function applyLang(){
  const t=MEM_T[getLang()];
  document.getElementById('mem-title').textContent=t.title;
  document.getElementById('lbl-desde').textContent=t.desde;
  document.getElementById('lbl-hasta').textContent=t.hasta;
  document.getElementById('filter-texto').placeholder=t.search;
  document.getElementById('btn-clear').textContent=t.clear;
  document.getElementById('empty-title').textContent=t.empty_title;
  document.getElementById('empty-body').textContent=t.empty_body;
}

function init(){applyLang();todaLaMemoria=VISTOP.get('memoria',[])||[];renderPersonFilter();aplicarFiltros();}

function renderPersonFilter(){
  const t=MEM_T[getLang()],wrap=document.getElementById('person-filter-wrap');
  wrap.innerHTML='';
  const todosChip=document.createElement('div');todosChip.className='person-chip'+(filtroPersona===null?' active':'');todosChip.textContent=t.todos;todosChip.onclick=()=>{filtroPersona=null;renderPersonFilter();aplicarFiltros();};wrap.appendChild(todosChip);
  const speakers=[...new Set(todaLaMemoria.map(e=>e.speaker))].filter(Boolean);
  speakers.forEach(sp=>{const chip=document.createElement('div');const isU=sp==='?';chip.className='person-chip'+(isU?' unknown-chip':'')+(filtroPersona===sp?' active':'');chip.textContent=isU?'?':sp;chip.onclick=()=>{filtroPersona=sp;renderPersonFilter();aplicarFiltros();};wrap.appendChild(chip);});
}

function aplicarFiltros(){
  const desde=document.getElementById('filter-desde').value,hasta=document.getElementById('filter-hasta').value,texto=document.getElementById('filter-texto').value.trim().toLowerCase();
  let f=[...todaLaMemoria];
  if(desde) f=f.filter(e=>e.ts>=new Date(desde).getTime());
  if(hasta) f=f.filter(e=>e.ts<=new Date(hasta).getTime());
  if(texto) f=f.filter(e=>e.text.toLowerCase().includes(texto));
  if(filtroPersona!==null) f=f.filter(e=>e.speaker===filtroPersona);
  renderMemoria(f,texto);
}

function limpiarFiltros(){document.getElementById('filter-desde').value='';document.getElementById('filter-hasta').value='';document.getElementById('filter-texto').value='';filtroPersona=null;renderPersonFilter();aplicarFiltros();}

function renderMemoria(entries,highlight){
  const list=document.getElementById('memory-list'),empty=document.getElementById('empty-state'),count=document.getElementById('result-count'),t=MEM_T[getLang()];
  Array.from(list.children).forEach(c=>{if(c.id!=='empty-state')c.remove();});
  if(!entries.length){empty.style.display='flex';count.innerHTML='';return;}
  empty.style.display='none';
  count.innerHTML=`<span>${entries.length}</span> ${entries.length!==1?t.records_pl:t.records}`;
  const grouped={};
  entries.forEach(e=>{const k=new Date(e.ts).toISOString().slice(0,10);if(!grouped[k])grouped[k]=[];grouped[k].push(e);});
  Object.keys(grouped).sort().reverse().forEach(dayKey=>{
    const block=document.createElement('div');block.className='day-block';
    const label=document.createElement('div');label.className='day-label';label.textContent=formatDayLabel(dayKey);block.appendChild(label);
    [...grouped[dayKey]].sort((a,b)=>b.ts-a.ts).forEach(e=>block.appendChild(buildLine(e,highlight)));
    list.insertBefore(block,empty);
  });
}

function buildLine(entry,highlight){
  const line=document.createElement('div');line.className='memory-line';
  const time=new Date(entry.ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const tit=getTitularName();
  let spClass='sp-t'; if(entry.speaker==='?')spClass='sp-u'; else if(entry.speaker!==tit&&entry.speaker!=='Titular')spClass='sp-i';
  let tx=entry.text;
  if(highlight){const rg=new RegExp(`(${escapeRegex(highlight)})`,'gi');tx=tx.replace(rg,'<mark>$1</mark>');}
  line.innerHTML=`<span class="line-time">${time}</span><span class="line-speaker ${spClass}">${entry.speaker}:</span><span class="line-text">${tx}</span>`;
  return line;
}

function formatDayLabel(dayKey){
  const t=MEM_T[getLang()],today=new Date().toISOString().slice(0,10),yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(dayKey===today)return t.today; if(dayKey===yesterday)return t.yesterday;
  const l=getLang(),locale=l==='en'?'en-US':l==='de'?'de-DE':l==='fr'?'fr-FR':l==='it'?'it-IT':l==='pt'?'pt-BR':l==='ru'?'ru-RU':'es-AR';
  return new Date(dayKey+'T12:00:00').toLocaleDateString(locale,{weekday:'long',day:'numeric',month:'long'});
}

function escapeRegex(str){return str.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

window.addEventListener('message',function(event){
  const{type,text,isFinal,timestamp,speaker}=event.data||{};
  if(type==='VISTOP_TRANSCRIPT'&&isFinal&&text){todaLaMemoria.push({speaker:speaker||'Titular',text,ts:timestamp||Date.now()});renderPersonFilter();aplicarFiltros();}
  if(type==='VISTOP_LANG_CHANGE'){applyLang();renderPersonFilter();aplicarFiltros();}
  if(type==='VISTOP_SPEAKER_IDENTIFIED'){todaLaMemoria=VISTOP.get('memoria',[])||[];renderPersonFilter();aplicarFiltros();}
});

init();
</script>
</body>
</html>
