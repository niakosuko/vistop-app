<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VISTOP – Escucha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#050A14;
    --cyan:#00D4FF;
    --violet:#7B2FFF;
    --text-primary:#FFFFFF;
    --text-secondary:rgba(255,255,255,0.75);
    --text-muted:rgba(255,255,255,0.45);
    --radius-pill:100px;
    --font-display:'Syne',sans-serif;
    --font-body:'DM Sans',sans-serif;
  }
  html,body{
    width:100%;height:100%;background:var(--bg);color:var(--text-primary);
    font-family:var(--font-body);font-size:16px;line-height:1.5;overflow:hidden;
    -webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;
  }
  .screen{display:flex;flex-direction:column;height:100%;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);gap:8px;}
  .top-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
  .mode-chip{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:var(--radius-pill);background:rgba(123,47,255,0.08);border:1px solid rgba(123,47,255,0.25);font-family:var(--font-display);font-size:11px;font-weight:700;color:#C89FFF;white-space:nowrap;}
  .mode-dot{width:6px;height:6px;border-radius:50%;background:#C89FFF;}
  .info-bar{padding:9px 16px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;background:rgba(255,255,255,0.02);font-size:12px;color:var(--text-muted);line-height:1.45;}
  .info-bar strong{color:#C89FFF;font-weight:700;}
  .interim-bar{padding:8px 16px;min-height:36px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
  .interim-bar span{font-size:14px;color:rgba(255,255,255,0.35);font-style:italic;}
  .transcript-area{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;}
  .transcript-area::-webkit-scrollbar{display:none;}
  .day-block{margin-bottom:4px;}
  .day-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.12em;text-transform:uppercase;padding:16px 0 8px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:10px;}
  .transcript-line{display:flex;gap:10px;padding:7px 0;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,0.04);}
  .line-time{font-family:var(--font-display);font-size:10px;color:rgba(255,255,255,0.4);flex-shrink:0;min-width:38px;padding-top:3px;}
  .line-speaker{font-family:var(--font-display);font-size:12px;font-weight:700;flex-shrink:0;min-width:34px;padding-top:2px;color:#C89FFF;}
  .line-speaker.sp-inter{color:#FFB347;}
  .line-text{font-size:15px;color:var(--text-primary);line-height:1.6;flex:1;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 32px;text-align:center;flex:1;}
  .empty-icon{width:60px;height:60px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;}
  .empty-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:rgba(255,255,255,0.6);}
  .empty-body{font-size:13px;color:rgba(255,255,255,0.35);max-width:260px;line-height:1.6;}
</style>
</head>
<body>
<div class="screen">
  <div class="top-bar">
    <div class="top-title" id="esc-title">Escucha</div>
    <div class="mode-chip"><div class="mode-dot"></div><span id="mode-label">Solo transcribe</span></div>
  </div>

  <div class="info-bar" id="info-bar">
    Todo lo nuevo queda como <strong>?</strong>. Después identificás personas desde Memoria.
  </div>

  <div class="interim-bar"><span id="interim-text"></span></div>

  <div class="transcript-area" id="transcript-area">
    <div id="transcript-lines"></div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </div>
      <div class="empty-title" id="empty-title">Sin transcripciones aún</div>
      <div class="empty-body" id="empty-body">Tocá el micrófono arriba y empezá a hablar.</div>
    </div>
  </div>
</div>

<script>
var VISTOP=window.parent&&window.parent.VISTOP?window.parent.VISTOP:{get:function(){return null;},save:function(){},append:function(){}};
var lineasPantalla=[];
var ultimaLineaId=null;

var ESC_T={
  es:{title:'Escucha',mode:'Solo transcribe',info:'Todo lo nuevo queda como <strong>?</strong>. Después identificás personas desde Memoria.',today:'Hoy',yesterday:'Ayer',empty_title:'Sin transcripciones aún',empty_body:'Tocá el micrófono arriba y empezá a hablar.'},
  en:{title:'Listen',mode:'Transcription only',info:'Everything new stays as <strong>?</strong>. Identify people later from Memory.',today:'Today',yesterday:'Yesterday',empty_title:'No transcriptions yet',empty_body:'Tap the microphone above and start speaking.'},
  pt:{title:'Escuta',mode:'Só transcreve',info:'Tudo novo fica como <strong>?</strong>. Depois identifique as pessoas na Memória.',today:'Hoje',yesterday:'Ontem',empty_title:'Sem transcrições ainda',empty_body:'Toque no microfone acima e comece a falar.'},
  fr:{title:'Écoute',mode:'Transcription seule',info:'Tout nouveau texte reste en <strong>?</strong>. Identifiez ensuite les personnes dans Mémoire.',today:"Aujourd'hui",yesterday:'Hier',empty_title:'Pas encore de transcriptions',empty_body:'Appuyez sur le microphone en haut et commencez à parler.'},
  de:{title:'Zuhören',mode:'Nur Transkription',info:'Alles Neue bleibt als <strong>?</strong>. Personen später im Speicher zuordnen.',today:'Heute',yesterday:'Gestern',empty_title:'Noch keine Transkriptionen',empty_body:'Tippen Sie auf das Mikrofon oben und beginnen Sie zu sprechen.'},
  it:{title:'Ascolto',mode:'Solo trascrizione',info:'Tutto il nuovo resta come <strong>?</strong>. Identifica le persone dopo in Memoria.',today:'Oggi',yesterday:'Ieri',empty_title:'Nessuna trascrizione ancora',empty_body:'Tocca il microfono in alto e inizia a parlare.'},
  ru:{title:'Слушать',mode:'Только запись',info:'Всё новое остаётся как <strong>?</strong>. Потом определите людей в Памяти.',today:'Сегодня',yesterday:'Вчера',empty_title:'Транскрипций пока нет',empty_body:'Нажмите на микрофон вверху и говорите.'}
};

function getLang(){
  var t=VISTOP.get('titular',{})||{},i=(t&&t.idioma)?t.idioma:'es-AR';
  if(i.startsWith('en'))return 'en';
  if(i.startsWith('pt'))return 'pt';
  if(i.startsWith('fr'))return 'fr';
  if(i.startsWith('de'))return 'de';
  if(i.startsWith('it'))return 'it';
  if(i.startsWith('ru'))return 'ru';
  return 'es';
}

function applyLang(){
  var t=ESC_T[getLang()];
  document.getElementById('esc-title').textContent=t.title;
  document.getElementById('mode-label').textContent=t.mode;
  document.getElementById('info-bar').innerHTML=t.info;
  document.getElementById('empty-title').textContent=t.empty_title;
  document.getElementById('empty-body').textContent=t.empty_body;
}

function formatDayLabel(dayKey){
  var t=ESC_T[getLang()],today=new Date().toISOString().slice(0,10),yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(dayKey===today)return t.today;
  if(dayKey===yesterday)return t.yesterday;
  var l=getLang(),locale=l==='en'?'en-US':l==='de'?'de-DE':l==='fr'?'fr-FR':l==='it'?'it-IT':l==='pt'?'pt-BR':l==='ru'?'ru-RU':'es-AR';
  return new Date(dayKey+'T12:00:00').toLocaleDateString(locale,{weekday:'long',day:'numeric',month:'long'});
}

function init(){
  applyLang();
  cargarDesdeMemoria();
}

function cargarDesdeMemoria(){
  lineasPantalla=[];
  document.getElementById('transcript-lines').innerHTML='';

  var memoria=VISTOP.get('memoria',[])||[];
  if(memoria.length){
    document.getElementById('empty-state').style.display='none';
    memoria.forEach(function(e){
      lineasPantalla.push({
        id:e.id||('old_'+(e.ts||Date.now())+'_'+Math.random().toString(36).slice(2,5)),
        speaker:e.speaker||'?',
        text:e.text||'',
        ts:e.ts||Date.now()
      });
    });
    renderTodo();
  }else{
    document.getElementById('empty-state').style.display='flex';
  }
}

function renderTodo(){
  var cont=document.getElementById('transcript-lines');
  cont.innerHTML='';
  var grouped=groupByDay(lineasPantalla);
  Object.keys(grouped).sort().reverse().forEach(function(k){cont.appendChild(buildDayBlock(k,grouped[k]));});
  document.getElementById('transcript-area').scrollTop=0;
}

function groupByDay(entries){
  var g={};
  entries.forEach(function(e){
    var k=new Date(e.ts).toISOString().slice(0,10);
    if(!g[k])g[k]=[];
    g[k].push(e);
  });
  return g;
}

function buildDayBlock(dayKey,entries){
  var block=document.createElement('div');
  block.className='day-block';
  block.dataset.day=dayKey;

  var label=document.createElement('div');
  label.className='day-label';
  label.textContent=formatDayLabel(dayKey);
  block.appendChild(label);

  var sorted=[].concat(entries).sort(function(a,b){return b.ts-a.ts;});
  sorted.forEach(function(e){block.appendChild(buildLine(e));});
  return block;
}

function buildLine(entry){
  var line=document.createElement('div');
  line.className='transcript-line';
  line.dataset.id=entry.id;

  var time=new Date(entry.ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  var speaker=entry.speaker||'?';
  var spClass=(speaker&&speaker!=='?')?'sp-inter':'';

  line.innerHTML='<span class="line-time">'+time+'</span>';

  var spEl=document.createElement('span');
  spEl.className='line-speaker '+spClass;
  spEl.textContent=speaker+':';
  line.appendChild(spEl);

  var tx=document.createElement('span');
  tx.className='line-text';
  tx.textContent=entry.text||'';
  line.appendChild(tx);

  return line;
}

function mostrarFinalSinGuardar(texto,speaker,ts){
  if(!texto||!texto.trim())return;
  var ahora=ts||Date.now();
  var t1=texto.toLowerCase().trim();

  document.getElementById('empty-state').style.display='none';

  /*
    Evita que se vea duplicado en Escucha:
    si llega "Hola", luego "Hola buen día", luego "Hola buen día estoy...",
    reemplaza la línea anterior por la más completa.
    No guarda nada en memoria: app.html es el único que guarda.
  */
  if(lineasPantalla.length){
    var ultima=lineasPantalla[0];
    var t2=(ultima.text||'').toLowerCase().trim();
    var cerca=(ahora-(ultima.ts||0))<15000;
    var parecido=t1===t2||t1.indexOf(t2)!==-1||t2.indexOf(t1)!==-1;

    if(cerca&&parecido){
      if(t1.length>=t2.length){
        ultima.text=texto;
        ultima.speaker=speaker||'?';
        ultima.ts=ahora;
      }
      renderTodo();
      return;
    }
  }

  lineasPantalla.unshift({
    id:'live_'+ahora+'_'+Math.random().toString(36).slice(2,5),
    speaker:speaker||'?',
    text:texto,
    ts:ahora
  });
  renderTodo();
}

window.addEventListener('message',function(event){
  var msg=event.data||{},type=msg.type;

  if(type==='VISTOP_TRANSCRIPT'){
    if(msg.isFinal){
      document.getElementById('interim-text').textContent='';
      mostrarFinalSinGuardar(msg.text,msg.speaker||'?',msg.timestamp||Date.now());
    }else{
      document.getElementById('interim-text').textContent=msg.text||'';
    }
  }

  if(type==='VISTOP_SPEAKER_IDENTIFIED'){
    cargarDesdeMemoria();
  }

  if(type==='VISTOP_LANG_CHANGE'){
    applyLang();
    renderTodo();
  }
});

init();
</script>
</body>
</html>
