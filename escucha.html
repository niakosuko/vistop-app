<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VISTOP – Escucha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#050A14; --cyan:#00D4FF; --violet:#7B2FFF; --text-primary:#FFFFFF; --text-secondary:rgba(255,255,255,0.75); --text-muted:rgba(255,255,255,0.45); --radius-pill:100px; --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif; }
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text-primary);font-family:var(--font-body);font-size:16px;line-height:1.5;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
  .screen{display:flex;flex-direction:column;height:100%;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.08);gap:8px;}
  .top-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;flex-shrink:0;}
  .mic-toggle{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);cursor:pointer;transition:all 0.2s;font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-secondary);user-select:none;flex-shrink:0;}
  .mic-toggle.active{border-color:rgba(0,212,255,0.6);color:var(--cyan);background:rgba(0,212,255,0.1);}
  .mic-toggle-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0;}
  .mic-toggle.active .mic-toggle-dot{background:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,0.8);animation:pulse-dot 2s ease-in-out infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
  .speaker-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;background:rgba(255,255,255,0.02);}
  .speaker-label{font-size:12px;color:var(--text-muted);font-weight:500;flex-shrink:0;}
  .speaker-chips{display:flex;gap:6px;flex:1;overflow-x:auto;}
  .speaker-chips::-webkit-scrollbar{display:none;}
  .speaker-chip{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.15);background:transparent;font-family:var(--font-display);font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0;}
  .speaker-chip.titular-chip.active{border-color:rgba(0,212,255,0.5);color:var(--cyan);background:rgba(0,212,255,0.1);}
  .speaker-chip.otro-chip.active{border-color:rgba(123,47,255,0.5);color:#C89FFF;background:rgba(123,47,255,0.1);}
  .speaker-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .interim-bar{padding:8px 16px;min-height:36px;border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
  .interim-bar span{font-size:14px;color:rgba(255,255,255,0.35);font-style:italic;}
  .transcript-area{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;}
  .transcript-area::-webkit-scrollbar{display:none;}
  .day-block{margin-bottom:4px;}
  .day-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);letter-spacing:0.12em;text-transform:uppercase;padding:16px 0 8px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:10px;}
  .transcript-line{display:flex;gap:10px;padding:7px 0;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,0.04);}
  .line-time{font-family:var(--font-display);font-size:10px;color:rgba(255,255,255,0.4);flex-shrink:0;min-width:38px;padding-top:3px;}
  .line-speaker{font-family:var(--font-display);font-size:12px;font-weight:700;flex-shrink:0;min-width:60px;padding-top:2px;}
  .line-speaker.sp-titular{color:var(--cyan);}
  .line-speaker.sp-unknown{color:#C89FFF;text-decoration:underline dotted;cursor:pointer;}
  .line-speaker.sp-inter{color:#FFB347;}
  .line-text{font-size:15px;color:var(--text-primary);line-height:1.6;flex:1;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 32px;text-align:center;flex:1;}
  .empty-icon{width:60px;height:60px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;}
  .empty-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:rgba(255,255,255,0.6);}
  .empty-body{font-size:13px;color:rgba(255,255,255,0.35);max-width:240px;line-height:1.6;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,10,20,0.9);backdrop-filter:blur(16px);z-index:50;align-items:flex-end;justify-content:center;}
  .modal-overlay.visible{display:flex;}
  .modal{width:100%;max-width:480px;background:#0D1A2E;border:1px solid rgba(255,255,255,0.15);border-radius:28px 28px 0 0;padding:24px 20px 40px;display:flex;flex-direction:column;gap:14px;}
  .modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto 6px;}
  .modal-title{font-family:var(--font-display);font-size:17px;font-weight:700;text-align:center;}
  .modal-sub{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;margin-top:-6px;}
  .modal-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;color:var(--text-primary);font-family:var(--font-body);font-size:15px;outline:none;-webkit-appearance:none;}
  .modal-input:focus{border-color:rgba(0,212,255,0.5);}
  ::placeholder{color:rgba(255,255,255,0.3);}
  .interlocutores-list{display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;}
  .inter-option{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;cursor:pointer;transition:all 0.2s;}
  .inter-option:active{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);}
  .inter-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,183,71,0.15);border:1px solid rgba(255,183,71,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:700;color:#FFB347;flex-shrink:0;}
  .inter-name{font-family:var(--font-display);font-size:14px;font-weight:700;}
  .inter-role{font-size:12px;color:rgba(255,255,255,0.4);}
  .modal-divider{text-align:center;font-size:12px;color:rgba(255,255,255,0.3);}
  .modal-btn-save{width:100%;padding:15px;border-radius:var(--radius-pill);background:linear-gradient(135deg,#00D4FF,#0066FF);color:#fff;font-family:var(--font-display);font-size:15px;font-weight:700;border:none;cursor:pointer;}
  .modal-btn-save:active{transform:scale(0.97);}
  .modal-btn-cancel{width:100%;padding:13px;border-radius:var(--radius-pill);background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-family:var(--font-display);font-size:14px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div class="screen">
  <div class="top-bar">
    <div class="top-title" id="esc-title">Escucha</div>
    <div class="mic-toggle" id="mic-toggle" onclick="toggleMic()">
      <div class="mic-toggle-dot"></div>
      <span id="mic-toggle-label">Iniciar</span>
    </div>
  </div>
  <div class="speaker-bar">
    <span class="speaker-label" id="lbl-habla">Habla:</span>
    <div class="speaker-chips">
      <div class="speaker-chip titular-chip active" id="chip-titular" onclick="setSpeaker('titular')">
        <div class="speaker-dot"></div><span id="titular-chip-name">Titular</span>
      </div>
      <div class="speaker-chip otro-chip" id="chip-otro" onclick="setSpeaker('unknown')">
        <div class="speaker-dot"></div><span id="otro-chip-label">Otro habla</span>
      </div>
    </div>
  </div>
  <div class="interim-bar"><span id="interim-text"></span></div>
  <div class="transcript-area" id="transcript-area">
    <div id="transcript-lines"></div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></div>
      <div class="empty-title" id="empty-title">Sin transcripciones aún</div>
      <div class="empty-body" id="empty-body">Tocá Iniciar y empezá a hablar.</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-identify" onclick="cerrarModalSiOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-id-title">¿Quién habló?</div>
    <div class="modal-sub" id="modal-id-sub">Identificá esta voz para registrarla</div>
    <div class="interlocutores-list" id="interlocutores-list"></div>
    <div class="modal-divider" id="modal-or">— o escribí un nombre nuevo —</div>
    <input type="text" class="modal-input" id="modal-nombre-input">
    <button type="button" class="modal-btn-save" id="modal-btn-id" onclick="confirmarIdentificacion()">Identificar</button>
    <button type="button" class="modal-btn-cancel" id="modal-btn-cancel" onclick="cerrarModalIdentificar()">Cancelar</button>
  </div>
</div>

<script>
var VISTOP=window.parent&&window.parent.VISTOP?window.parent.VISTOP:{get:function(){return null;},save:function(){},append:function(){}};
var AppState=window.parent&&window.parent.AppState?window.parent.AppState:{};
var micActive=false,speakerActual='titular',sessionStart=Date.now();

var ESC_T={
  es:{title:'Escucha',start:'Iniciar',listening:'Escuchando',today:'Hoy',yesterday:'Ayer',empty_title:'Sin transcripciones aún',empty_body:'Tocá Iniciar y empezá a hablar.',habla:'Habla:',otro:'Otro habla',modal_title:'¿Quién habló?',modal_sub:'Identificá esta voz para registrarla',modal_or:'— o escribí un nombre nuevo —',modal_ph:'Nombre de la persona...',identificar:'Identificar',cancelar:'Cancelar'},
  en:{title:'Listen',start:'Start',listening:'Listening',today:'Today',yesterday:'Yesterday',empty_title:'No transcriptions yet',empty_body:'Tap Start and begin speaking.',habla:'Speaking:',otro:'Someone else',modal_title:'Who spoke?',modal_sub:'Identify this voice to register it',modal_or:'— or type a new name —',modal_ph:"Person's name...",identificar:'Identify',cancelar:'Cancel'},
  pt:{title:'Escuta',start:'Iniciar',listening:'Escutando',today:'Hoje',yesterday:'Ontem',empty_title:'Sem transcrições ainda',empty_body:'Toque em Iniciar e comece a falar.',habla:'Fala:',otro:'Outro fala',modal_title:'Quem falou?',modal_sub:'Identifique esta voz para registrá-la',modal_or:'— ou escreva um novo nome —',modal_ph:'Nome da pessoa...',identificar:'Identificar',cancelar:'Cancelar'},
  fr:{title:'Écoute',start:'Démarrer',listening:'En écoute',today:"Aujourd'hui",yesterday:'Hier',empty_title:'Pas encore de transcriptions',empty_body:'Appuyez sur Démarrer et commencez à parler.',habla:'Parle :',otro:"Quelqu'un d'autre",modal_title:'Qui a parlé ?',modal_sub:"Identifiez cette voix pour l'enregistrer",modal_or:'— ou tapez un nouveau nom —',modal_ph:'Nom de la personne...',identificar:'Identifier',cancelar:'Annuler'},
  de:{title:'Zuhören',start:'Starten',listening:'Hört zu',today:'Heute',yesterday:'Gestern',empty_title:'Noch keine Transkriptionen',empty_body:'Tippen Sie auf Starten und beginnen Sie zu sprechen.',habla:'Spricht:',otro:'Jemand anderes',modal_title:'Wer hat gesprochen?',modal_sub:'Identifizieren Sie diese Stimme',modal_or:'— oder geben Sie einen neuen Namen ein —',modal_ph:'Name der Person...',identificar:'Identifizieren',cancelar:'Abbrechen'},
  it:{title:'Ascolto',start:'Inizia',listening:'In ascolto',today:'Oggi',yesterday:'Ieri',empty_title:'Nessuna trascrizione ancora',empty_body:'Tocca Inizia e inizia a parlare.',habla:'Parla:',otro:'Qualcun altro',modal_title:'Chi ha parlato?',modal_sub:'Identifica questa voce per registrarla',modal_or:'— o scrivi un nuovo nome —',modal_ph:'Nome della persona...',identificar:'Identifica',cancelar:'Annulla'},
  ru:{title:'Слушать',start:'Начать',listening:'Слушаю',today:'Сегодня',yesterday:'Вчера',empty_title:'Транскрипций пока нет',empty_body:'Нажмите Начать и говорите.',habla:'Говорит:',otro:'Кто-то другой',modal_title:'Кто говорил?',modal_sub:'Определите этот голос для записи',modal_or:'— или введите новое имя —',modal_ph:'Имя человека...',identificar:'Определить',cancelar:'Отмена'},
};

function getLang(){var t=VISTOP.get('titular',{})||{},i=(t&&t.idioma)?t.idioma:'es-AR';if(i.startsWith('en'))return 'en';if(i.startsWith('pt'))return 'pt';if(i.startsWith('fr'))return 'fr';if(i.startsWith('de'))return 'de';if(i.startsWith('it'))return 'it';if(i.startsWith('ru'))return 'ru';return 'es';}
function getTitularName(){var t=VISTOP.get('titular',{});return t&&t.nombre?t.nombre.split(' ')[0]:'Titular';}

function applyLang(){
  var t=ESC_T[getLang()];
  document.getElementById('esc-title').textContent=t.title;
  document.getElementById('empty-title').textContent=t.empty_title;
  document.getElementById('empty-body').textContent=t.empty_body;
  document.getElementById('lbl-habla').textContent=t.habla;
  document.getElementById('otro-chip-label').textContent=t.otro;
  document.getElementById('titular-chip-name').textContent=getTitularName();
  document.getElementById('modal-id-title').textContent=t.modal_title;
  document.getElementById('modal-id-sub').textContent=t.modal_sub;
  document.getElementById('modal-or').textContent=t.modal_or;
  document.getElementById('modal-nombre-input').placeholder=t.modal_ph;
  document.getElementById('modal-btn-id').textContent=t.identificar;
  document.getElementById('modal-btn-cancel').textContent=t.cancelar;
  if(!micActive)document.getElementById('mic-toggle-label').textContent=t.start;
  else document.getElementById('mic-toggle-label').textContent=t.listening;
}

function formatDayLabel(dayKey){
  var t=ESC_T[getLang()],today=new Date().toISOString().slice(0,10),yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(dayKey===today)return t.today;if(dayKey===yesterday)return t.yesterday;
  var l=getLang(),locale=l==='en'?'en-US':l==='de'?'de-DE':l==='fr'?'fr-FR':l==='it'?'it-IT':l==='pt'?'pt-BR':l==='ru'?'ru-RU':'es-AR';
  return new Date(dayKey+'T12:00:00').toLocaleDateString(locale,{weekday:'long',day:'numeric',month:'long'});
}

function init(){
  applyLang();sessionStart=Date.now();
  var memoria=VISTOP.get('memoria',[]);
  if(memoria&&memoria.length){
    document.getElementById('empty-state').style.display='none';
    var grouped=groupByDay(memoria);
    Object.keys(grouped).sort().reverse().forEach(function(k){document.getElementById('transcript-lines').appendChild(buildDayBlock(k,grouped[k]));});
    document.getElementById('transcript-area').scrollTop=0;
  }
  syncMicState();
}

function groupByDay(entries){var g={};entries.forEach(function(e){var k=new Date(e.ts).toISOString().slice(0,10);if(!g[k])g[k]=[];g[k].push(e);});return g;}

function buildDayBlock(dayKey,entries){
  var block=document.createElement('div');block.className='day-block';block.dataset.day=dayKey;
  var label=document.createElement('div');label.className='day-label';label.textContent=formatDayLabel(dayKey);block.appendChild(label);
  var sorted=[].concat(entries).sort(function(a,b){return b.ts-a.ts;});
  sorted.forEach(function(e){block.appendChild(buildLine(e));});
  return block;
}

function buildLine(entry){
  var line=document.createElement('div');line.className='transcript-line';
  var time=new Date(entry.ts).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  var tit=getTitularName();
  var spClass='sp-titular';
  if(entry.speaker==='?')spClass='sp-unknown';
  else if(entry.speaker!==tit&&entry.speaker!=='Titular')spClass='sp-inter';
  var spEl=document.createElement('span');spEl.className='line-speaker '+spClass;spEl.textContent=entry.speaker+':';
  if(entry.speaker==='?')spEl.onclick=function(){abrirModalIdentificar();};
  line.innerHTML='<span class="line-time">'+time+'</span>';
  line.appendChild(spEl);
  var tx=document.createElement('span');tx.className='line-text';tx.textContent=entry.text;line.appendChild(tx);
  return line;
}

function addLine(entry){
  document.getElementById('empty-state').style.display='none';
  var dayKey=new Date(entry.ts).toISOString().slice(0,10);
  var block=document.getElementById('transcript-lines').querySelector('[data-day="'+dayKey+'"]');
  if(!block){
    block=document.createElement('div');block.className='day-block';block.dataset.day=dayKey;
    var l=document.createElement('div');l.className='day-label';l.textContent=formatDayLabel(dayKey);block.appendChild(l);
    document.getElementById('transcript-lines').insertBefore(block,document.getElementById('transcript-lines').firstChild);
  }
  block.insertBefore(buildLine(entry),block.querySelector('.day-label').nextSibling);
  document.getElementById('transcript-area').scrollTop=0;
}

function setSpeaker(type){
  speakerActual=type;
  document.getElementById('chip-titular').classList.toggle('active',type==='titular');
  document.getElementById('chip-otro').classList.toggle('active',type==='unknown');
  window.parent&&window.parent.postMessage&&window.parent.postMessage({type:'VISTOP_SET_SPEAKER',data:{speaker:type}},'*');
}

function toggleMic(){
  var t=ESC_T[getLang()];
  if(micActive){micActive=false;setMicUI(false,t.start);window.parent&&window.parent.postMessage({type:'VISTOP_PAUSE_MIC'},'*');}
  else{micActive=true;setMicUI(true,t.listening);sessionStart=Date.now();window.parent&&window.parent.postMessage({type:'VISTOP_START_MIC'},'*');}
}

function setMicUI(active,label){
  var mt=document.getElementById('mic-toggle'),lbl=document.getElementById('mic-toggle-label');
  if(active){mt.classList.add('active');lbl.textContent=label;}
  else{mt.classList.remove('active');lbl.textContent=label;document.getElementById('interim-text').textContent='';}
}

function syncMicState(){
  var t=ESC_T[getLang()],s=window.parent&&window.parent.AppState?window.parent.AppState.micStatus:'idle';
  if(s==='active'){micActive=true;setMicUI(true,t.listening);}
  else{micActive=false;setMicUI(false,t.start);}
}

function abrirModalIdentificar(){
  document.getElementById('modal-nombre-input').value='';
  var lista=document.getElementById('interlocutores-list');lista.innerHTML='';
  var inters=VISTOP.get('interlocutores',[])||[];
  inters.forEach(function(p){
    var el=document.createElement('div');el.className='inter-option';
    var init=p.nombre.split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
    el.innerHTML='<div class="inter-avatar">'+init+'</div><div><div class="inter-name">'+p.nombre+'</div><div class="inter-role">'+(p.rol||'')+'</div></div>';
    el.onclick=function(){document.getElementById('modal-nombre-input').value=p.nombre;confirmarIdentificacion();};
    lista.appendChild(el);
  });
  document.getElementById('modal-identify').classList.add('visible');
  setTimeout(function(){document.getElementById('modal-nombre-input').focus();},200);
}

function cerrarModalIdentificar(){document.getElementById('modal-identify').classList.remove('visible');}
function cerrarModalSiOverlay(event){if(event.target===document.getElementById('modal-identify'))cerrarModalIdentificar();}

function confirmarIdentificacion(){
  var nombre=document.getElementById('modal-nombre-input').value.trim();
  if(!nombre){document.getElementById('modal-nombre-input').focus();return;}
  window.parent&&window.parent.postMessage({type:'VISTOP_IDENTIFY_SPEAKER',data:{newSpeaker:nombre,sessionStart:sessionStart}},'*');
  cerrarModalIdentificar();
  document.querySelectorAll('.sp-unknown').forEach(function(el){el.textContent=nombre+':';el.className='line-speaker sp-inter';el.onclick=null;});
  speakerActual=nombre;
  document.getElementById('chip-titular').classList.remove('active');
  document.getElementById('chip-otro').classList.add('active');
  document.getElementById('otro-chip-label').textContent=nombre;
}

window.addEventListener('message',function(event){
  var msg=event.data||{},type=msg.type;
  if(type==='VISTOP_TRANSCRIPT'){
    if(msg.isFinal){
      document.getElementById('interim-text').textContent='';
      addLine({speaker:msg.speaker||getTitularName(),text:msg.text,ts:msg.timestamp||Date.now()});
    } else {
      document.getElementById('interim-text').textContent=msg.text;
    }
  }
  if(type==='VISTOP_MIC_STATUS'){
    var t=ESC_T[getLang()];
    if(msg.status==='active'){micActive=true;setMicUI(true,t.listening);}
    else if(msg.status==='paused'||msg.status==='idle'){micActive=false;setMicUI(false,t.start);document.getElementById('interim-text').textContent='';}
  }
  if(type==='VISTOP_SPEAKER_IDENTIFIED'){
    document.getElementById('otro-chip-label').textContent=msg.speaker;
    speakerActual=msg.speaker;
    document.querySelectorAll('.sp-unknown').forEach(function(el){el.textContent=msg.speaker+':';el.className='line-speaker sp-inter';el.onclick=null;});
  }
  if(type==='VISTOP_LANG_CHANGE')applyLang();
});

init();
</script>
</body>
</html>
