<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VISTOP – Análisis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#050A14; --bg-input:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.15);
    --cyan:#00D4FF; --blue:#0066FF; --violet:#7B2FFF;
    --text-primary:#FFFFFF; --text-secondary:rgba(255,255,255,0.75); --text-muted:rgba(255,255,255,0.45);
    --radius-card:24px; --radius-pill:100px;
    --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
    --turak:#00D4FF; --cirak:#C89FFF;
  }
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text-primary);font-family:var(--font-body);font-size:16px;line-height:1.5;overflow-y:auto;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
  .screen{padding:20px 20px 100px;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.08);}
  .top-title{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
  .counter-chip{font-family:var(--font-display);font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--text-muted);}
  .counter-chip.activo{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--cyan);}
  .modo-row{display:flex;gap:8px;margin-bottom:16px;}
  .modo-btn{flex:1;padding:12px 0;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);font-family:var(--font-display);font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;}
  .modo-btn.sel-turak{background:rgba(0,212,255,0.15);color:var(--turak);border-color:rgba(0,212,255,0.4);}
  .modo-btn.sel-cirak{background:rgba(200,159,255,0.15);color:var(--cirak);border-color:rgba(200,159,255,0.4);}
  .modo-btn.sel-juntos{background:rgba(255,183,71,0.12);color:#FFB347;border-color:rgba(255,183,71,0.35);}
  .longitud-row{display:flex;gap:6px;margin-bottom:20px;}
  .long-btn{flex:1;padding:10px 0;border-radius:14px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);font-family:var(--font-display);font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;}
  .long-btn.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);color:#fff;}
  .desc-card{padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;margin-bottom:20px;display:flex;gap:12px;align-items:center;}
  .desc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
  .desc-icon.turak{background:rgba(0,212,255,0.12);}
  .desc-icon.cirak{background:rgba(200,159,255,0.12);}
  .desc-icon.juntos{background:rgba(255,183,71,0.12);}
  .desc-name{font-family:var(--font-display);font-size:14px;font-weight:700;}
  .desc-name.turak{color:var(--turak);}
  .desc-name.cirak{color:var(--cirak);}
  .desc-name.juntos{color:#FFB347;}
  .desc-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .analyze-btn{width:100%;padding:17px;border-radius:var(--radius-pill);border:none;font-family:var(--font-display);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .analyze-btn.turak{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;box-shadow:0 4px 24px rgba(0,212,255,0.25);}
  .analyze-btn.cirak{background:linear-gradient(135deg,#C89FFF,#7B2FFF);color:#fff;box-shadow:0 4px 24px rgba(123,47,255,0.25);}
  .analyze-btn.juntos{background:linear-gradient(135deg,#FFB347,#FF6B35);color:#fff;box-shadow:0 4px 24px rgba(255,183,71,0.25);}
  .analyze-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
  .loading-wrap{display:none;flex-direction:column;align-items:center;gap:14px;padding:28px 0;}
  .loading-wrap.visible{display:flex;}
  .loading-dots{display:flex;gap:8px;}
  .loading-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.3);animation:loading-bounce 1.2s ease-in-out infinite;}
  .loading-dot:nth-child(2){animation-delay:0.2s}.loading-dot:nth-child(3){animation-delay:0.4s}
  @keyframes loading-bounce{0%,100%{transform:translateY(0);opacity:0.3}50%{transform:translateY(-7px);opacity:1}}
  .loading-text{font-size:14px;color:var(--text-secondary);font-style:italic;text-align:center;max-width:260px;}
  .result-card{display:none;flex-direction:column;gap:16px;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-card);padding:22px 18px;margin-bottom:16px;}
  .result-card.visible{display:flex;}
  .result-card.turak{border-color:rgba(0,212,255,0.25);background:rgba(0,212,255,0.04);}
  .result-card.cirak{border-color:rgba(200,159,255,0.25);background:rgba(200,159,255,0.04);}
  .result-header{display:flex;align-items:center;gap:10px;}
  .result-icon{font-size:20px;}
  .result-title{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;flex:1;}
  .result-title.turak{color:var(--turak);}
  .result-title.cirak{color:var(--cirak);}
  .result-text{font-size:15px;color:var(--text-primary);line-height:1.9;white-space:pre-wrap;}
  .escuchar-grande{width:100%;padding:14px;border-radius:var(--radius-pill);border:none;font-family:var(--font-display);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;margin-top:4px;}
  .escuchar-grande.turak{background:rgba(0,212,255,0.12);color:var(--turak);border:1px solid rgba(0,212,255,0.25);}
  .escuchar-grande.cirak{background:rgba(200,159,255,0.12);color:var(--cirak);border:1px solid rgba(200,159,255,0.25);}
  .escuchar-grande.hablando{opacity:0.7;}
  .escuchar-grande:active{transform:scale(0.97);}
  .mas-btn{width:100%;padding:14px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.04);font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;margin-bottom:16px;display:none;}
  .mas-btn.visible{display:block;}
  .mas-btn:active{background:rgba(255,255,255,0.1);color:#fff;}
  .voice-section{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px 16px;margin-bottom:20px;}
  .voice-label{font-size:11px;color:rgba(255,255,255,0.4);font-weight:700;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;}
  .voice-select{width:100%;padding:11px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;-webkit-appearance:none;cursor:pointer;}
  .voice-select option{background:#0D1628;}
  .no-memory{display:none;flex-direction:column;align-items:center;gap:12px;padding:28px 20px;text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-card);margin-bottom:20px;}
  .no-memory.visible{display:flex;}
  .no-memory-text{font-size:14px;color:var(--text-secondary);line-height:1.6;max-width:260px;}
  .juntos-divider{display:flex;align-items:center;gap:12px;margin:4px 0 12px;}
  .juntos-line{flex:1;height:1px;background:rgba(255,255,255,0.1);}
  .juntos-label{font-family:var(--font-display);font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.08em;}
  .agotado{text-align:center;padding:16px;font-size:13px;color:rgba(255,255,255,0.35);font-style:italic;display:none;}
  .agotado.visible{display:block;}
</style>
</head>
<body>
<div class="screen">
  <div class="top-bar">
    <div class="top-title">Análisis</div>
    <div class="counter-chip" id="counter-chip">0 / 5</div>
  </div>
  <div class="modo-row">
    <button type="button" class="modo-btn sel-turak" id="btn-turak" onclick="setModo('turak')">TURAK</button>
    <button type="button" class="modo-btn" id="btn-cirak" onclick="setModo('cirak')">CIRAK</button>
    <button type="button" class="modo-btn" id="btn-juntos" onclick="setModo('juntos')">JUNTOS</button>
  </div>
  <div class="longitud-row">
    <button type="button" class="long-btn" id="long-corta" onclick="setLongitud('corta')">CORTA</button>
    <button type="button" class="long-btn active" id="long-media" onclick="setLongitud('media')">MEDIA</button>
    <button type="button" class="long-btn" id="long-larga" onclick="setLongitud('larga')">LARGA</button>
  </div>
  <div class="desc-card">
    <div class="desc-icon turak" id="desc-icon">⚡</div>
    <div>
      <div class="desc-name turak" id="desc-name">Turak</div>
      <div class="desc-sub" id="desc-sub">Psicológico · Coaching · Astrológico · Espiritual</div>
    </div>
  </div>
  <div class="no-memory" id="no-memory">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
    <div class="no-memory-text">No hay transcripciones aún. Empezá a escuchar para poder analizar.</div>
  </div>
  <button type="button" class="analyze-btn turak" id="analyze-btn" onclick="analizar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span id="analyze-label">Analizar con Turak</span>
  </button>
  <div class="loading-wrap" id="loading-wrap">
    <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    <div class="loading-text" id="loading-text">Analizando tu vida...</div>
  </div>
  <div class="result-card turak" id="result-turak">
    <div class="result-header">
      <div class="result-icon">⚡</div>
      <div class="result-title turak">TURAK</div>
    </div>
    <div class="result-text" id="text-turak"></div>
    <button type="button" class="escuchar-grande turak" id="escuchar-turak" onclick="toggleSpeech('turak')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <span id="escuchar-label-turak">Escuchar a Turak</span>
    </button>
  </div>
  <div class="juntos-divider" id="juntos-divider" style="display:none;">
    <div class="juntos-line"></div>
    <div class="juntos-label">CIRAK</div>
    <div class="juntos-line"></div>
  </div>
  <div class="result-card cirak" id="result-cirak">
    <div class="result-header">
      <div class="result-icon">🌙</div>
      <div class="result-title cirak">CIRAK</div>
    </div>
    <div class="result-text" id="text-cirak"></div>
    <button type="button" class="escuchar-grande cirak" id="escuchar-cirak" onclick="toggleSpeech('cirak')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <span id="escuchar-label-cirak">Escuchar a Cirak</span>
    </button>
  </div>
  <button type="button" class="mas-btn" id="mas-btn" onclick="analizar()">+ Pedir otra devolución</button>
  <div class="agotado" id="agotado">Llegaste al límite de devoluciones por sesión.</div>
  <div class="voice-section">
    <div class="voice-label">Voz de devolución</div>
    <select class="voice-select" id="voice-select" onchange="guardarVoz()"><option value="">Voz por defecto</option></select>
  </div>
</div>
<script>
const VISTOP = window.parent?.VISTOP || {get:()=>null, save:()=>{}, append:()=>{}};
let modoActual='turak', longitud='media', devolucionesHoy=0;
const MAX_DEVOLUCIONES=5;
let vocesDisponibles=[], hablandoTurak=false, hablandoCirak=false, uttTurak=null, uttCirak=null;

const MODOS = {
  turak:  {icon:'⚡', color:'turak',  nombre:'Turak',         sub:'Psicológico · Coaching · Astrológico · Espiritual'},
  cirak:  {icon:'🌙',color:'cirak',  nombre:'Cirak',         sub:'Espiritual · Relacional · Astrológico · Emocional'},
  juntos: {icon:'✨', color:'juntos', nombre:'Turak & Cirak', sub:'Análisis integral conjunto'}
};

function init(){
  setModo('turak'); setLongitud('media');
  cargarVoces();
  window.speechSynthesis.onvoiceschanged = cargarVoces;
  const memoria = VISTOP.get('memoria',[]) || [];
  if(!memoria.length){
    document.getElementById('no-memory').classList.add('visible');
    document.getElementById('analyze-btn').disabled = true;
  }
  actualizarCounter();
}

function setModo(modo){
  modoActual=modo;
  ['turak','cirak','juntos'].forEach(m=>{
    document.getElementById('btn-'+m).className='modo-btn'+(m===modo?' sel-'+m:'');
  });
  const cfg=MODOS[modo];
  document.getElementById('desc-icon').textContent=cfg.icon;
  document.getElementById('desc-icon').className='desc-icon '+cfg.color;
  document.getElementById('desc-name').textContent=cfg.nombre;
  document.getElementById('desc-name').className='desc-name '+cfg.color;
  document.getElementById('desc-sub').textContent=cfg.sub;
  document.getElementById('analyze-btn').className='analyze-btn '+cfg.color;
  document.getElementById('analyze-label').textContent=
    modo==='turak'?'Analizar con Turak':modo==='cirak'?'Analizar con Cirak':'Análisis conjunto';
  ocultarResultados();
}

function setLongitud(l){
  longitud=l;
  ['corta','media','larga'].forEach(x=>{
    document.getElementById('long-'+x).className='long-btn'+(x===l?' active':'');
  });
}

function actualizarCounter(){
  const chip=document.getElementById('counter-chip');
  chip.textContent=devolucionesHoy+' / '+MAX_DEVOLUCIONES;
  chip.className='counter-chip'+(devolucionesHoy>0?' activo':'');
  const masBtn=document.getElementById('mas-btn');
  const agotado=document.getElementById('agotado');
  if(devolucionesHoy>=MAX_DEVOLUCIONES){
    masBtn.classList.remove('visible');
    agotado.classList.add('visible');
    document.getElementById('analyze-btn').disabled=true;
  } else if(devolucionesHoy>0){
    masBtn.classList.add('visible');
    masBtn.textContent='+ Pedir otra devolución ('+(MAX_DEVOLUCIONES-devolucionesHoy)+' restantes)';
    agotado.classList.remove('visible');
  } else {
    masBtn.classList.remove('visible');
    agotado.classList.remove('visible');
  }
}

/* ══ ANÁLISIS LOCAL ══ */
const SIGNOS=[
  {nombre:'Capricornio',desde:[12,22],hasta:[1,19]},{nombre:'Acuario',desde:[1,20],hasta:[2,18]},
  {nombre:'Piscis',desde:[2,19],hasta:[3,20]},{nombre:'Aries',desde:[3,21],hasta:[4,19]},
  {nombre:'Tauro',desde:[4,20],hasta:[5,20]},{nombre:'Géminis',desde:[5,21],hasta:[6,20]},
  {nombre:'Cáncer',desde:[6,21],hasta:[7,22]},{nombre:'Leo',desde:[7,23],hasta:[8,22]},
  {nombre:'Virgo',desde:[8,23],hasta:[9,22]},{nombre:'Libra',desde:[9,23],hasta:[10,22]},
  {nombre:'Escorpio',desde:[10,23],hasta:[11,21]},{nombre:'Sagitario',desde:[11,22],hasta:[12,21]}
];

function getSigno(d){
  if(!d)return null;
  const dt=new Date(d+'T12:00:00'),mes=dt.getMonth()+1,dia=dt.getDate();
  for(const s of SIGNOS){
    const[dm,dd]=s.desde,[hm,hd]=s.hasta;
    if(dm===hm){if(mes===dm&&dia>=dd&&dia<=hd)return s;}
    else{if((mes===dm&&dia>=dd)||(mes===hm&&dia<=hd))return s;}
  }
  return SIGNOS[0];
}

function analizar(){
  const memoria=VISTOP.get('memoria',[])||[];
  const titular=VISTOP.get('titular',{})||{};
  if(!memoria.length||devolucionesHoy>=MAX_DEVOLUCIONES)return;

  ocultarResultados();
  document.getElementById('loading-wrap').classList.add('visible');
  document.getElementById('analyze-btn').disabled=true;
  document.getElementById('mas-btn').classList.remove('visible');

  const msgs=['Analizando tu vida...','Preparando tu devolución...','Procesando tus conversaciones...','Integrando tu historial...','Profundizando el análisis...'];
  document.getElementById('loading-text').textContent=msgs[devolucionesHoy%msgs.length];

  setTimeout(()=>{
    const resultado=generarAnalisis(titular,memoria);
    document.getElementById('loading-wrap').classList.remove('visible');
    mostrarResultados(resultado);
    devolucionesHoy++;
    actualizarCounter();
    document.getElementById('analyze-btn').disabled=devolucionesHoy>=MAX_DEVOLUCIONES;
  },2000);
}

function generarAnalisis(titular,memoria){
  const nombre=titular.nombre?titular.nombre.split(' ')[0]:'';
  const signo=getSigno(titular.fecha_nacimiento);
  const religion=titular.religion||'';
  const objetivos=(titular.objetivos||[]);
  const metas=(titular.metas||[]);
  const interlocutores=VISTOP.get('interlocutores',[])||[];

  // Analizar patrones en la memoria
  const textos=memoria.map(e=>e.text).join(' ').toLowerCase();
  const speakers=[...new Set(memoria.map(e=>e.speaker).filter(s=>s&&s!=='?'&&s!==nombre))];
  const totalEntradas=memoria.length;

  // Detectar patrones
  const tieneConflicto=/no sé|duda|confundido|perdido|cansado|frustrado|difícil|problema|preocup/i.test(textos);
  const tieneAccion=/voy a|quiero|necesito|tengo que|planeo|decidí|vamos|empiezo/i.test(textos);
  const tieneEmocion=/siento|me duele|me alegra|estoy|me preocupa|extraño|amo|quiero|feliz|triste/i.test(textos);
  const tieneRelaciones=speakers.length>0;
  const ultimaEntrada=memoria[memoria.length-1];
  const diasRegistrados=[...new Set(memoria.map(e=>new Date(e.ts).toLocaleDateString()))].length;

  let turakTexto='', cirakTexto='';

  // Calcular multiplicador según longitud
  const esLarga=longitud==='larga', esCorta=longitud==='corta';

  /* ══ TURAK ══ */
  if(modoActual==='turak'||modoActual==='juntos'){
    let t=nombre?nombre+', ':'';

    if(devolucionesHoy===0){
      t+=`esto es lo que veo cuando miro todo lo que registraste.\n\n`;
    } else if(devolucionesHoy===1){
      t+=`voy a ir más profundo esta vez.\n\n`;
    } else {
      t+=`hay algo que no terminé de decirte antes.\n\n`;
    }

    t+=`Tenés ${totalEntradas} registro${totalEntradas!==1?'s':''} de ${diasRegistrados} día${diasRegistrados!==1?'s':''} diferentes. Eso ya me dice algo sobre tu constancia.\n\n`;

    if(tieneConflicto){
      t+=`Hay momentos donde la duda aparece fuerte en lo que decís. Eso no es debilidad — es una señal de que estás procesando algo que importa. Pero cuidado: el análisis sin acción es solo un círculo.\n\n`;
    }

    if(tieneAccion){
      t+=`Hay intención de moverte. Eso es bueno. La pregunta es si esa intención tiene fecha y primer paso concreto, o todavía vive solo en las palabras.\n\n`;
    }

    if(tieneRelaciones&&!esCorta){
      t+=`Las personas que aparecen en tus conversaciones — ${speakers.slice(0,3).join(', ')} — no están ahí por casualidad. Cada vínculo que mencionás tiene peso en cómo te movés o te quedás quieto.\n\n`;
    }

    if(signo&&!esCorta){
      t+=`Como ${signo.nombre}, el momento que vivís tiene una energía particular. El día de hoy es propicio para ${signo.nombre==='Aries'||signo.nombre==='Leo'||signo.nombre==='Sagitario'?'tomar decisiones y ejecutar':'consolidar, revisar y profundizar'}.\n\n`;
    }

    if(objetivos.length>0&&!esCorta){
      t+=`Tus objetivos están ahí registrados. La pregunta que te hago es simple: lo que hiciste y dijiste esta semana, ¿te acerca o te aleja de eso?\n\n`;
    }

    if(esLarga&&religion&&religion!=='agnostico'&&religion!=='ateo'){
      t+=`Desde tu fe, cada decisión que tomás tiene un peso que va más allá de lo práctico. Lo que elegís hacer o no hacer construye quién sos frente a lo que creés.\n\n`;
    }

    if(esCorta){
      t+=`Una sola pregunta: ¿qué acción concreta podés hacer hoy que te acerque a donde querés estar?\n\nEso es todo. Eso es Turak.`;
    } else {
      t+=`No te digo que tenés que hacer todo perfecto. Te digo que el tiempo pasa igual, con o sin movimiento. La diferencia la hacés vos.\n\nEso es Turak.`;
    }

    turakTexto=t;
  }

  /* ══ CIRAK ══ */
  if(modoActual==='cirak'||modoActual==='juntos'){
    let c=nombre?nombre+'... ':'';

    if(devolucionesHoy===0){
      c+=`me senté a escucharte. Todo lo que registraste, cada palabra, cada conversación.\n\n`;
    } else if(devolucionesHoy===1){
      c+=`quiero hablarte de algo que sentí y no dije antes.\n\n`;
    } else {
      c+=`hay una capa más profunda que quiero que veamos juntos.\n\n`;
    }

    if(tieneEmocion){
      c+=`Hay algo que estás sintiendo y que merece espacio antes de ser resuelto. No todo lo que duele necesita una solución inmediata. A veces necesita ser simplemente reconocido.\n\n`;
    }

    if(tieneRelaciones&&!esCorta){
      c+=`Las personas que aparecen en tu vida — ${speakers.slice(0,3).join(', ')} — forman parte de tu historia. Cada vínculo que cultivás o descuidás habla de cómo te relacionás con vos mismo también.\n\n`;
    }

    if(signo){
      c+=`Tu signo, ${signo.nombre}, te da una forma particular de sentir el mundo. Hoy el universo te invita a ${signo.nombre==='Cáncer'||signo.nombre==='Piscis'||signo.nombre==='Escorpio'?'confiar en tu intuición y soltar lo que ya no sirve':'conectar con lo que realmente importa y no solo lo urgente'}.\n\n`;
    }

    if(religion&&religion!=='agnostico'&&religion!=='ateo'&&!esCorta){
      c+=`Tu fe es una fuente que siempre está disponible. En los momentos donde la lógica no alcanza, esa dimensión espiritual puede sostenerte de una manera que ningún análisis puede reemplazar.\n\n`;
    }

    if(metas.length>0&&!esCorta){
      c+=`Tus metas no son solo objetivos — son promesas que te hiciste a vos mismo. Honrarlas o no honrarlas construye la relación que tenés con tu propia palabra.\n\n`;
    }

    if(esLarga){
      c+=`Cada día que registraste en VISTOP es un paso de consciencia. Muchas personas viven sin mirarse. Vos elegiste mirarte. Eso tiene un valor enorme.\n\n`;
    }

    if(esCorta){
      c+=`Date el permiso de estar en el proceso sin apurarte. El camino se hace caminando.\n\nEso es Cirak.`;
    } else {
      c+=`Lo que escucho en vos no es una persona perdida. Es una persona que está encontrando su camino. Y eso, aunque a veces no se siente así, es exactamente donde tenés que estar.\n\nEso es Cirak.`;
    }

    cirakTexto=c;
  }

  return {turak:turakTexto, cirak:cirakTexto};
}

function mostrarResultados(resultado){
  const mostrarTurak=modoActual==='turak'||modoActual==='juntos';
  const mostrarCirak=modoActual==='cirak'||modoActual==='juntos';
  if(mostrarTurak&&resultado.turak){
    document.getElementById('text-turak').textContent=resultado.turak;
    document.getElementById('result-turak').classList.add('visible');
  }
  if(modoActual==='juntos'&&resultado.turak&&resultado.cirak){
    document.getElementById('juntos-divider').style.display='flex';
  }
  if(mostrarCirak&&resultado.cirak){
    document.getElementById('text-cirak').textContent=resultado.cirak;
    document.getElementById('result-cirak').classList.add('visible');
  }
}

function ocultarResultados(){
  document.getElementById('result-turak').classList.remove('visible');
  document.getElementById('result-cirak').classList.remove('visible');
  document.getElementById('juntos-divider').style.display='none';
  stopSpeech('turak'); stopSpeech('cirak');
}

/* ══ VOZ ══ */
function cargarVoces(){
  const voces=window.speechSynthesis.getVoices(),sel=document.getElementById('voice-select'),saved=VISTOP.get('voz_preferida','');
  sel.innerHTML='<option value="">Voz por defecto</option>';
  vocesDisponibles=voces;
  voces.forEach(v=>{
    const o=document.createElement('option');
    o.value=v.name; o.textContent=v.name+' ('+v.lang+')';
    if(v.name===saved)o.selected=true;
    sel.appendChild(o);
  });
}

function guardarVoz(){ VISTOP.save('voz_preferida',document.getElementById('voice-select').value); }

function toggleSpeech(quien){
  if(quien==='turak'){
    if(hablandoTurak){stopSpeech('turak');return;}
    const texto=document.getElementById('text-turak').textContent;
    if(texto)speakText(texto,'turak');
  } else {
    if(hablandoCirak){stopSpeech('cirak');return;}
    const texto=document.getElementById('text-cirak').textContent;
    if(texto)speakText(texto,'cirak');
  }
}

function speakText(texto,quien){
  stopSpeech(quien);
  window.parent?.postMessage({type:'VISTOP_SPEAKING_START'},'*');
  const utt=new SpeechSynthesisUtterance(texto);
  const vn=VISTOP.get('voz_preferida','');
  if(vn){const v=vocesDisponibles.find(v=>v.name===vn);if(v)utt.voice=v;}
  const titular=VISTOP.get('titular',{})||{};
  utt.lang=titular.idioma||'es-AR';
  utt.rate=0.9;
  utt.pitch=quien==='cirak'?1.1:0.92;
  utt.onstart=()=>{
    if(quien==='turak'){hablandoTurak=true;setSpeakUI('turak',true);}
    else{hablandoCirak=true;setSpeakUI('cirak',true);}
  };
  utt.onend=()=>{
    if(quien==='turak'){hablandoTurak=false;setSpeakUI('turak',false);uttTurak=null;}
    else{hablandoCirak=false;setSpeakUI('cirak',false);uttCirak=null;}
    setTimeout(()=>window.parent?.postMessage({type:'VISTOP_SPEAKING_END'},'*'),600);
  };
  utt.onerror=()=>{
    if(quien==='turak'){hablandoTurak=false;setSpeakUI('turak',false);uttTurak=null;}
    else{hablandoCirak=false;setSpeakUI('cirak',false);uttCirak=null;}
    setTimeout(()=>window.parent?.postMessage({type:'VISTOP_SPEAKING_END'},'*'),300);
  };
  if(quien==='turak')uttTurak=utt; else uttCirak=utt;
  window.speechSynthesis.speak(utt);
}

function stopSpeech(quien){
  window.speechSynthesis.cancel();
  if(quien==='turak'){
    hablandoTurak=false;setSpeakUI('turak',false);
    if(uttTurak){uttTurak=null;setTimeout(()=>window.parent?.postMessage({type:'VISTOP_SPEAKING_END'},'*'),300);}
  } else {
    hablandoCirak=false;setSpeakUI('cirak',false);
    if(uttCirak){uttCirak=null;setTimeout(()=>window.parent?.postMessage({type:'VISTOP_SPEAKING_END'},'*'),300);}
  }
}

function setSpeakUI(quien,speaking){
  const btn=document.getElementById('escuchar-'+quien);
  const lbl=document.getElementById('escuchar-label-'+quien);
  if(speaking){btn.classList.add('hablando');lbl.textContent='Detener';}
  else{btn.classList.remove('hablando');lbl.textContent=quien==='turak'?'Escuchar a Turak':'Escuchar a Cirak';}
}

window.addEventListener('message',function(event){
  if(event.data&&event.data.type==='VISTOP_LANG_CHANGE')cargarVoces();
});

init();
</script>
