<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VISTOP – Análisis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#050A14; --bg-input:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.15);
    --cyan:#00D4FF; --blue:#0066FF; --violet:#7B2FFF;
    --text-primary:#FFFFFF; --text-secondary:rgba(255,255,255,0.75); --text-muted:rgba(255,255,255,0.45);
    --radius-card:24px; --radius-pill:100px;
    --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
    --turak:#00D4FF; --cirak:#C89FFF;
  }
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text-primary);font-family:var(--font-body);font-size:16px;line-height:1.5;overflow-y:auto;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
  .screen{padding:20px 20px 100px;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.08);}
  .top-title{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
  .counter-chip{font-family:var(--font-display);font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--radius-pill);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--text-muted);}
  .counter-chip.activo{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--cyan);}

  /* ── MODO SELECTOR ── */
  .modo-row{display:flex;gap:8px;margin-bottom:16px;}
  .modo-btn{flex:1;padding:12px 0;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);font-family:var(--font-display);font-size:14px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;}
  .modo-btn.sel-turak{background:rgba(0,212,255,0.15);color:var(--turak);border-color:rgba(0,212,255,0.4);}
  .modo-btn.sel-cirak{background:rgba(200,159,255,0.15);color:var(--cirak);border-color:rgba(200,159,255,0.4);}
  .modo-btn.sel-juntos{background:rgba(255,183,71,0.12);color:#FFB347;border-color:rgba(255,183,71,0.35);}

  /* ── LONGITUD ── */
  .longitud-row{display:flex;gap:6px;margin-bottom:20px;}
  .long-btn{flex:1;padding:10px 0;border-radius:14px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);font-family:var(--font-display);font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;}
  .long-btn.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);color:#fff;}

  /* ── DESCRIPCIONES ── */
  .desc-card{padding:16px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start;}
  .desc-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
  .desc-icon.turak{background:rgba(0,212,255,0.12);}
  .desc-icon.cirak{background:rgba(200,159,255,0.12);}
  .desc-icon.juntos{background:rgba(255,183,71,0.12);}
  .desc-name{font-family:var(--font-display);font-size:15px;font-weight:700;margin-bottom:4px;}
  .desc-name.turak{color:var(--turak);}
  .desc-name.cirak{color:var(--cirak);}
  .desc-name.juntos{color:#FFB347;}
  .desc-body{font-size:13px;color:var(--text-secondary);line-height:1.55;}

  /* ── BOTÓN ANALIZAR ── */
  .analyze-btn{width:100%;padding:17px;border-radius:var(--radius-pill);border:none;font-family:var(--font-display);font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .analyze-btn.turak{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff;box-shadow:0 4px 24px rgba(0,212,255,0.25);}
  .analyze-btn.cirak{background:linear-gradient(135deg,#C89FFF,#7B2FFF);color:#fff;box-shadow:0 4px 24px rgba(123,47,255,0.25);}
  .analyze-btn.juntos{background:linear-gradient(135deg,#FFB347,#FF6B35);color:#fff;box-shadow:0 4px 24px rgba(255,183,71,0.25);}
  .analyze-btn:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}

  /* ── LOADING ── */
  .loading-wrap{display:none;flex-direction:column;align-items:center;gap:14px;padding:28px 0;}
  .loading-wrap.visible{display:flex;}
  .loading-dots{display:flex;gap:8px;}
  .loading-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.3);animation:loading-bounce 1.2s ease-in-out infinite;}
  .loading-dot:nth-child(2){animation-delay:0.2s}.loading-dot:nth-child(3){animation-delay:0.4s}
  @keyframes loading-bounce{0%,100%{transform:translateY(0);opacity:0.3}50%{transform:translateY(-7px);opacity:1}}
  .loading-text{font-size:14px;color:var(--text-secondary);font-style:italic;text-align:center;}

  /* ── RESULT CARDS ── */
  .result-card{display:none;flex-direction:column;gap:18px;border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius-card);padding:22px 18px;margin-bottom:16px;}
  .result-card.visible{display:flex;}
  .result-card.turak{border-color:rgba(0,212,255,0.25);background:rgba(0,212,255,0.04);}
  .result-card.cirak{border-color:rgba(200,159,255,0.25);background:rgba(200,159,255,0.04);}
  .result-header{display:flex;align-items:center;justify-content:space-between;}
  .result-title{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;}
  .result-title.turak{color:var(--turak);}
  .result-title.cirak{color:var(--cirak);}
  .speak-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);color:var(--text-secondary);font-family:var(--font-display);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .speak-btn.speaking{border-color:rgba(200,159,255,0.5);color:var(--cirak);background:rgba(200,159,255,0.08);}
  .speak-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .speak-btn.speaking .speak-dot{animation:pulse-dot 1.5s ease-in-out infinite;}
  @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.3}}
  .result-text{font-size:15px;color:var(--text-primary);line-height:1.9;white-space:pre-wrap;}

  /* ── MÁS DEVOLUCIÓN ── */
  .mas-btn{width:100%;padding:14px;border-radius:var(--radius-pill);border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;margin-bottom:16px;display:none;}
  .mas-btn.visible{display:block;}
  .mas-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}

  /* ── VOZ ── */
  .voice-section{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:16px 18px;margin-bottom:20px;}
  .voice-label{font-size:11px;color:rgba(255,255,255,0.45);font-weight:700;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;}
  .voice-select{width:100%;padding:11px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:12px;color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;-webkit-appearance:none;cursor:pointer;}
  .voice-select option{background:#0D1628;}

  /* ── SIN MEMORIA ── */
  .no-memory{display:none;flex-direction:column;align-items:center;gap:12px;padding:28px 20px;text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-card);margin-bottom:20px;}
  .no-memory.visible{display:flex;}
  .no-memory-text{font-size:14px;color:var(--text-secondary);line-height:1.6;max-width:260px;}

  /* ── DIVIDER JUNTOS ── */
  .juntos-divider{display:flex;align-items:center;gap:12px;margin:8px 0 16px;}
  .juntos-line{flex:1;height:1px;background:rgba(255,255,255,0.1);}
  .juntos-label{font-family:var(--font-display);font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.08em;}
</style>
</head>
<body>
<div class="screen">

  <!-- TOP -->
  <div class="top-bar">
    <div class="top-title" id="ana-title">Análisis</div>
    <div class="counter-chip" id="counter-chip">0 / 5</div>
  </div>

  <!-- MODO: TURAK / CIRAK / JUNTOS -->
  <div class="modo-row">
    <button type="button" class="modo-btn sel-turak" id="btn-turak" onclick="setModo('turak')">TURAK</button>
    <button type="button" class="modo-btn" id="btn-cirak" onclick="setModo('cirak')">CIRAK</button>
    <button type="button" class="modo-btn" id="btn-juntos" onclick="setModo('juntos')">JUNTOS</button>
  </div>

  <!-- LONGITUD -->
  <div class="longitud-row">
    <button type="button" class="long-btn" id="long-corta" onclick="setLongitud('corta')">CORTA</button>
    <button type="button" class="long-btn active" id="long-media" onclick="setLongitud('media')">MEDIA</button>
    <button type="button" class="long-btn" id="long-larga" onclick="setLongitud('larga')">LARGA</button>
  </div>

  <!-- DESCRIPCIÓN DEL MODO -->
  <div class="desc-card">
    <div class="desc-icon turak" id="desc-icon">⚡</div>
    <div>
      <div class="desc-name turak" id="desc-name">Turak</div>
      <div class="desc-body" id="desc-body">Voz paterna. Directo, claro y sin rodeos. Te dice la verdad con amor.</div>
    </div>
  </div>

  <!-- SIN MEMORIA -->
  <div class="no-memory" id="no-memory">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
    <div class="no-memory-text" id="no-memory-text">No hay transcripciones aún. Empezá a escuchar para poder analizar.</div>
  </div>

  <!-- BOTÓN ANALIZAR -->
  <button type="button" class="analyze-btn turak" id="analyze-btn" onclick="analizar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    <span id="analyze-label">Analizar con Turak</span>
  </button>

  <!-- LOADING -->
  <div class="loading-wrap" id="loading-wrap">
    <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
    <div class="loading-text" id="loading-text">La mesa de trabajo está analizando tu vida...</div>
  </div>

  <!-- RESULTADO TURAK -->
  <div class="result-card turak" id="result-turak">
    <div class="result-header">
      <div class="result-title turak">⚡ TURAK</div>
      <button type="button" class="speak-btn" id="speak-turak" onclick="toggleSpeech('turak')"><div class="speak-dot"></div><span id="speak-label-turak">Escuchar</span></button>
    </div>
    <div class="result-text" id="text-turak"></div>
  </div>

  <!-- DIVIDER JUNTOS -->
  <div class="juntos-divider" id="juntos-divider" style="display:none;">
    <div class="juntos-line"></div>
    <div class="juntos-label">CIRAK RESPONDE</div>
    <div class="juntos-line"></div>
  </div>

  <!-- RESULTADO CIRAK -->
  <div class="result-card cirak" id="result-cirak">
    <div class="result-header">
      <div class="result-title cirak">🌙 CIRAK</div>
      <button type="button" class="speak-btn" id="speak-cirak" onclick="toggleSpeech('cirak')"><div class="speak-dot"></div><span id="speak-label-cirak">Escuchar</span></button>
    </div>
    <div class="result-text" id="text-cirak"></div>
  </div>

  <!-- MÁS DEVOLUCIÓN -->
  <button type="button" class="mas-btn" id="mas-btn" onclick="analizar()">
    + Pedir otra devolución
  </button>

  <!-- VOZ -->
  <div class="voice-section">
    <div class="voice-label" id="voice-label">Voz de devolución</div>
    <select class="voice-select" id="voice-select" onchange="guardarVoz()"><option value="">Voz por defecto</option></select>
  </div>

</div>
<script>
const VISTOP = window.parent?.VISTOP || {get:()=>null, save:()=>{}, append:()=>{}};

let modoActual = 'turak';
let longitud = 'media';
let devolucionesHoy = 0;
let MAX_DEVOLUCIONES = 5;
let vocesDisponibles = [];
let hablandoTurak = false;
let hablandoCirak = false;
let uttTurak = null;
let uttCirak = null;

/* ── TEXTOS MODO ── */
const MODOS = {
  turak: { icon:'⚡', color:'turak', desc:'Voz paterna. Directo, claro y sin rodeos. Te dice la verdad con amor.' },
  cirak: { icon:'🌙', color:'cirak', desc:'Voz materna. Te guía con amor hacia lo que conviene hacer.' },
  juntos: { icon:'✨', color:'juntos', desc:'Turak y Cirak dialogan juntos sobre tu vida. Una visión completa.' }
};

const LONGITUDES = {
  corta: '2 a 3 párrafos clave, lo esencial sin extenderse',
  media: 'Una página completa con profundidad pero sin abrumar',
  larga: 'Análisis completo y detallado de todos los aspectos'
};

/* ── INIT ── */
function init() {
  setModo('turak');
  setLongitud('media');
  cargarVoces();
  window.speechSynthesis.onvoiceschanged = cargarVoces;
  const memoria = VISTOP.get('memoria', []) || [];
  if (!memoria.length) {
    document.getElementById('no-memory').classList.add('visible');
    document.getElementById('analyze-btn').disabled = true;
  }
  actualizarCounter();
}

/* ── MODO ── */
function setModo(modo) {
  modoActual = modo;
  ['turak','cirak','juntos'].forEach(m => {
    const btn = document.getElementById('btn-'+m);
    btn.className = 'modo-btn' + (m === modo ? ' sel-'+m : '');
  });
  const cfg = MODOS[modo];
  document.getElementById('desc-icon').textContent = cfg.icon;
  document.getElementById('desc-icon').className = 'desc-icon ' + cfg.color;
  document.getElementById('desc-name').textContent = modo === 'juntos' ? 'Turak & Cirak' : (modo === 'turak' ? 'Turak' : 'Cirak');
  document.getElementById('desc-name').className = 'desc-name ' + cfg.color;
  document.getElementById('desc-body').textContent = cfg.desc;
  const btn = document.getElementById('analyze-btn');
  btn.className = 'analyze-btn ' + cfg.color;
  document.getElementById('analyze-label').textContent =
    modo === 'turak' ? 'Analizar con Turak' :
    modo === 'cirak' ? 'Analizar con Cirak' : 'Análisis conjunto';
  ocultarResultados();
}

/* ── LONGITUD ── */
function setLongitud(l) {
  longitud = l;
  ['corta','media','larga'].forEach(x => {
    document.getElementById('long-'+x).className = 'long-btn' + (x === l ? ' active' : '');
  });
}

/* ── COUNTER ── */
function actualizarCounter() {
  const chip = document.getElementById('counter-chip');
  chip.textContent = devolucionesHoy + ' / ' + MAX_DEVOLUCIONES;
  chip.className = 'counter-chip' + (devolucionesHoy > 0 ? ' activo' : '');
  const masBtn = document.getElementById('mas-btn');
  if (devolucionesHoy > 0 && devolucionesHoy < MAX_DEVOLUCIONES) {
    masBtn.classList.add('visible');
    masBtn.textContent = '+ Pedir otra devolución (' + (MAX_DEVOLUCIONES - devolucionesHoy) + ' restantes)';
  } else {
    masBtn.classList.remove('visible');
  }
}

/* ── CONSTRUIR PROMPT ── */
function construirPrompt(titular, memoria, interlocutores) {
  const nombre = titular.nombre || 'el titular';
  const fechaNac = titular.fecha_nacimiento || null;
  const signo = fechaNac ? getSigno(fechaNac) : null;
  const religion = titular.religion || 'no especificada';
  const objetivos = (titular.objetivos || []).join('; ') || 'no registrados';
  const metas = (titular.metas || []).join('; ') || 'no registradas';
  const hoy = new Date().toLocaleDateString('es-AR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  const historial = memoria.map(e => {
    const fecha = new Date(e.ts).toLocaleDateString('es-AR');
    const hora = new Date(e.ts).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
    return `[${fecha} ${hora}] ${e.speaker}: ${e.text}`;
  }).join('\n');

  const personas = interlocutores && interlocutores.length > 0
    ? interlocutores.map(p => `- ${p.nombre}${p.rol ? ' ('+p.rol+')' : ''}`).join('\n')
    : 'No hay interlocutores registrados';

  const longDesc = LONGITUDES[longitud];

  const esJuntos = modoActual === 'juntos';
  const esSoloTurak = modoActual === 'turak';
  const esSoloCirak = modoActual === 'cirak';

  let instruccionModo = '';
  if (esSoloTurak) {
    instruccionModo = `Genera SOLO la respuesta de TURAK. No incluyas a Cirak.`;
  } else if (esSoloCirak) {
    instruccionModo = `Genera SOLO la respuesta de CIRAK. No incluyas a Turak.`;
  } else {
    instruccionModo = `Genera las respuestas de TURAK y CIRAK como un diálogo donde se complementan. Turak habla primero, luego Cirak puede hacer referencia a lo que dijo Turak y agregar su perspectiva.`;
  }

  return `Sos el sistema VISTOP de análisis personal integral.

## MESA DE TRABAJO INTERNA (invisible al titular — solo para tu análisis interno)
Antes de responder, internamente simulá una mesa de debate entre 4 especialistas:
1. PSICÓLOGO: analiza patrones emocionales, conductuales y psicológicos profundos
2. COACH: cruza todo con los objetivos y metas declarados, detecta brechas entre intención y acción
3. ASTRÓLOGO: analiza el contexto astrológico según la fecha de nacimiento y el día actual
4. AUTORIDAD ESPIRITUAL/RELIGIOSA: habla desde la fe y espiritualidad del titular

Estos 4 debaten internamente. El titular NUNCA ve este debate. Solo ve el resultado final de TURAK y CIRAK.

## PERFIL DEL TITULAR
- Nombre: ${nombre}
- Fecha de nacimiento: ${fechaNac || 'no registrada'}
- Signo astrológico: ${signo ? signo.nombre : 'no calculable'}
- Religión/espiritualidad: ${religion}
- Objetivos: ${objetivos}
- Metas: ${metas}
- Fecha y día de hoy: ${hoy}

## PERSONAS EN SU VIDA
${personas}

## HISTORIAL COMPLETO DE CONVERSACIONES
${historial}

## VOCES

### TURAK — Voz paterna, masculina
- Carácter: Directo, claro, sin rodeos. Como un padre que te ama y te dice la verdad aunque duela.
- Ángulo dominante: Psicológico + Coaching + Astrológico
- También incluye dimensión espiritual pero desde la perspectiva de la acción y la responsabilidad
- Analiza: patrones de comportamiento, alineación con objetivos, momento astrológico para ejecutar, qué dice su fe sobre sus decisiones
- Menciona a las personas de su vida cuando es relevante para el análisis
- Tono: Firme, amoroso, honesto. No endulza la realidad pero tampoco destruye.

### CIRAK — Voz materna, femenina
- Carácter: Guía amorosa. Como una madre que sabe lo que conviene y te orienta con sabiduría.
- Ángulo dominante: Espiritual + Religioso + Astrológico
- También incluye dimensión psicológica y de coaching pero desde lo emocional y relacional
- Analiza: mundo emocional, vínculos con otras personas, momento astrológico para sanar o conectar, qué dice su fe sobre su camino
- Menciona a las personas de su vida cuando es relevante
- Tono: Cálido, sabio, orientado al futuro. Te abraza con las palabras.

## INSTRUCCIÓN DE MODO
${instruccionModo}

## LONGITUD SOLICITADA
${longDesc}

Esta es la devolución número ${devolucionesHoy + 1} de ${MAX_DEVOLUCIONES} posibles. ${devolucionesHoy > 0 ? 'Ya hubo devoluciones anteriores — esta debe profundizar en aspectos diferentes o complementarios, no repetir lo mismo.' : 'Es la primera devolución — hacé una panorámica integral.'}

## FORMATO DE RESPUESTA
Respondé ÚNICAMENTE con un JSON válido, sin texto antes ni después, sin bloques de código markdown:
{
  "turak": "texto completo de Turak o string vacío si no corresponde",
  "cirak": "texto completo de Cirak o string vacío si no corresponde"
}`;
}

/* ── ANALIZAR ── */
async function analizar() {
  const memoria = VISTOP.get('memoria', []) || [];
  const titular = VISTOP.get('titular', {}) || {};
  const interlocutores = VISTOP.get('interlocutores', []) || [];

  if (!memoria.length) return;
  if (devolucionesHoy >= MAX_DEVOLUCIONES) return;

  ocultarResultados();
  document.getElementById('loading-wrap').classList.add('visible');
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('mas-btn').classList.remove('visible');

  const loadingMsgs = [
    'La mesa de trabajo está analizando tu vida...',
    'Turak y Cirak están preparando tu devolución...',
    'Los especialistas están debatiendo sobre vos...',
    'Analizando tus patrones y relaciones...',
    'Integrando todo tu historial...'
  ];
  document.getElementById('loading-text').textContent = loadingMsgs[devolucionesHoy % loadingMsgs.length];

  try {
    const prompt = construirPrompt(titular, memoria, interlocutores);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const rawText = data.content?.map(b => b.text || '').join('') || '';

    let resultado = { turak: '', cirak: '' };
    try {
      const clean = rawText.replace(/```json|```/g, '').trim();
      resultado = JSON.parse(clean);
    } catch(e) {
      // Si no parsea, intentar extraer manualmente
      resultado.turak = rawText;
    }

    document.getElementById('loading-wrap').classList.remove('visible');
    mostrarResultados(resultado);
    devolucionesHoy++;
    actualizarCounter();
    document.getElementById('analyze-btn').disabled = false;

  } catch(err) {
    document.getElementById('loading-wrap').classList.remove('visible');
    document.getElementById('loading-text').textContent = 'Error al conectar. Verificá tu conexión.';
    document.getElementById('analyze-btn').disabled = false;
    actualizarCounter();
  }
}

/* ── MOSTRAR RESULTADOS ── */
function mostrarResultados(resultado) {
  const mostrarTurak = modoActual === 'turak' || modoActual === 'juntos';
  const mostrarCirak = modoActual === 'cirak' || modoActual === 'juntos';
  const esJuntos = modoActual === 'juntos';

  if (mostrarTurak && resultado.turak) {
    document.getElementById('text-turak').textContent = resultado.turak;
    document.getElementById('result-turak').classList.add('visible');
  }

  if (esJuntos && resultado.turak && resultado.cirak) {
    document.getElementById('juntos-divider').style.display = 'flex';
  }

  if (mostrarCirak && resultado.cirak) {
    document.getElementById('text-cirak').textContent = resultado.cirak;
    document.getElementById('result-cirak').classList.add('visible');
  }
}

function ocultarResultados() {
  document.getElementById('result-turak').classList.remove('visible');
  document.getElementById('result-cirak').classList.remove('visible');
  document.getElementById('juntos-divider').style.display = 'none';
  stopSpeech('turak');
  stopSpeech('cirak');
}

/* ── VOZ ── */
function cargarVoces() {
  const voces = window.speechSynthesis.getVoices();
  const sel = document.getElementById('voice-select');
  const saved = VISTOP.get('voz_preferida', '');
  sel.innerHTML = '<option value="">Voz por defecto</option>';
  vocesDisponibles = voces;
  voces.forEach(v => {
    const o = document.createElement('option');
    o.value = v.name;
    o.textContent = `${v.name} (${v.lang})`;
    if (v.name === saved) o.selected = true;
    sel.appendChild(o);
  });
}

function guardarVoz() {
  VISTOP.save('voz_preferida', document.getElementById('voice-select').value);
}

function toggleSpeech(quien) {
  if (quien === 'turak') {
    if (hablandoTurak) { stopSpeech('turak'); return; }
    const texto = document.getElementById('text-turak').textContent;
    if (texto) speakText(texto, 'turak');
  } else {
    if (hablandoCirak) { stopSpeech('cirak'); return; }
    const texto = document.getElementById('text-cirak').textContent;
    if (texto) speakText(texto, 'cirak');
  }
}

function speakText(texto, quien) {
  stopSpeech(quien);
  window.parent?.postMessage({type:'VISTOP_SPEAKING_START'}, '*');
  const utt = new SpeechSynthesisUtterance(texto);
  const vn = VISTOP.get('voz_preferida', '');
  if (vn) { const v = vocesDisponibles.find(v => v.name === vn); if (v) utt.voice = v; }
  const titular = VISTOP.get('titular', {}) || {};
  utt.lang = titular.idioma || 'es-AR';
  utt.rate = 0.9;
  utt.pitch = quien === 'cirak' ? 1.1 : 0.95;
  utt.onstart = () => {
    if (quien === 'turak') { hablandoTurak = true; setSpeakUI('turak', true); }
    else { hablandoCirak = true; setSpeakUI('cirak', true); }
  };
  utt.onend = () => {
    if (quien === 'turak') { hablandoTurak = false; setSpeakUI('turak', false); uttTurak = null; }
    else { hablandoCirak = false; setSpeakUI('cirak', false); uttCirak = null; }
    setTimeout(() => window.parent?.postMessage({type:'VISTOP_SPEAKING_END'}, '*'), 600);
  };
  utt.onerror = () => {
    if (quien === 'turak') { hablandoTurak = false; setSpeakUI('turak', false); uttTurak = null; }
    else { hablandoCirak = false; setSpeakUI('cirak', false); uttCirak = null; }
    setTimeout(() => window.parent?.postMessage({type:'VISTOP_SPEAKING_END'}, '*'), 300);
  };
  if (quien === 'turak') uttTurak = utt; else uttCirak = utt;
  window.speechSynthesis.speak(utt);
}

function stopSpeech(quien) {
  if (quien === 'turak') {
    window.speechSynthesis.cancel();
    hablandoTurak = false; setSpeakUI('turak', false);
    if (uttTurak) { uttTurak = null; setTimeout(() => window.parent?.postMessage({type:'VISTOP_SPEAKING_END'}, '*'), 300); }
  } else {
    window.speechSynthesis.cancel();
    hablandoCirak = false; setSpeakUI('cirak', false);
    if (uttCirak) { uttCirak = null; setTimeout(() => window.parent?.postMessage({type:'VISTOP_SPEAKING_END'}, '*'), 300); }
  }
}

function setSpeakUI(quien, speaking) {
  const btn = document.getElementById('speak-'+quien);
  const lbl = document.getElementById('speak-label-'+quien);
  if (speaking) { btn.classList.add('speaking'); lbl.textContent = 'Detener'; }
  else { btn.classList.remove('speaking'); lbl.textContent = 'Escuchar'; }
}

/* ── SIGNOS ── */
const SIGNOS = [
  {nombre:'Capricornio',desde:[12,22],hasta:[1,19]},
  {nombre:'Acuario',desde:[1,20],hasta:[2,18]},
  {nombre:'Piscis',desde:[2,19],hasta:[3,20]},
  {nombre:'Aries',desde:[3,21],hasta:[4,19]},
  {nombre:'Tauro',desde:[4,20],hasta:[5,20]},
  {nombre:'Géminis',desde:[5,21],hasta:[6,20]},
  {nombre:'Cáncer',desde:[6,21],hasta:[7,22]},
  {nombre:'Leo',desde:[7,23],hasta:[8,22]},
  {nombre:'Virgo',desde:[8,23],hasta:[9,22]},
  {nombre:'Libra',desde:[9,23],hasta:[10,22]},
  {nombre:'Escorpio',desde:[10,23],hasta:[11,21]},
  {nombre:'Sagitario',desde:[11,22],hasta:[12,21]}
];

function getSigno(d) {
  if (!d) return null;
  const dt = new Date(d + 'T12:00:00'), mes = dt.getMonth() + 1, dia = dt.getDate();
  for (const s of SIGNOS) {
    const [dm, dd] = s.desde, [hm, hd] = s.hasta;
    if (dm === hm) { if (mes === dm && dia >= dd && dia <= hd) return s; }
    else { if ((mes === dm && dia >= dd) || (mes === hm && dia <= hd)) return s; }
  }
  return SIGNOS[0];
}

window.addEventListener('message', function(event) {
  if (event.data && event.data.type === 'VISTOP_LANG_CHANGE') cargarVoces();
});

init();
</script>
